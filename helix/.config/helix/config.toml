# This file is for all of the configuration keys I could not find
[editor]
gutters = ["diagnostics", "line-numbers", "spacer", "diff"]
trim-final-newlines = true
trim-trailing-whitespace = true

[editor.auto-save.after-delay]
enable = true
timeout = 30000

[keys.insert]
C-backspace = "delete_word_backward"
A-q = "normal_mode"

[keys.normal]
A-q = ":q"
A-w = ":w"
C-r = ":config-reload"
tab = ":bn"
S-tab = ":bp"
